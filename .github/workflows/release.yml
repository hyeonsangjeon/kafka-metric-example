name: Release container

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Publish multi-platform image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate release version
        id: version
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || exit 1
          version="${GITHUB_REF_NAME#v}"
          app_version="$(awk -F '[<>]' '/<version>/{print $3; exit}' app/pom.xml)"
          [[ "$app_version" == "$version" ]]
          [[ "$(jq -r .version web/package.json)" == "$version" ]]
          [[ "$(jq -r .version web/package-lock.json)" == "$version" ]]
          [[ "$(jq -r '.packages[""].version' web/package-lock.json)" == "$version" ]]
          grep -Fq "ghcr.io/${GITHUB_REPOSITORY}:${version}" README.md
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=Foundry Stream Lab
            org.opencontainers.image.description=Privacy-safe Foundry model-routing telemetry over Kafka and Vert.x
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest image provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Assert public multi-platform manifest
        shell: bash
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          docker logout "$REGISTRY"
          raw=$(docker buildx imagetools inspect "$REGISTRY/$IMAGE_NAME@$DIGEST" --raw)
          jq -e '
            any(.manifests[]; .platform.os == "linux" and .platform.architecture == "amd64") and
            any(.manifests[]; .platform.os == "linux" and .platform.architecture == "arm64")
          ' <<<"$raw"

  release:
    name: Create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.publish.outputs.version }}
          DIGEST: ${{ needs.publish.outputs.digest }}
        shell: bash
        run: |
          notes=$(printf 'Container: `ghcr.io/%s:%s`\n\nDigest: `%s`' \
            "$GITHUB_REPOSITORY" "$VERSION" "$DIGEST")
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Foundry Stream Lab $GITHUB_REF_NAME" \
            --generate-notes \
            --notes "$notes"
