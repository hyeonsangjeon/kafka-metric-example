name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn --batch-mode --no-transfer-progress verify

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --run
      - run: npm run build
      - run: npm audit --audit-level=high

  tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Test evaluation wrapper
        run: python -m unittest discover -s tools/eval/tests -p 'test_*.py'
      - name: Validate offline evaluation inputs
        run: python tools/eval/eval.py validate
      - name: Validate infrastructure sources
        shell: bash
        run: |
          bash -n infra/*.sh tools/evidence/*.sh
          jq empty infra/main.json tools/eval/profiles.json tools/eval/toolkit.lock.json
          docker compose config --quiet

  container:
    runs-on: ubuntu-latest
    needs: [backend, frontend, tooling]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - run: docker build --check .
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: true
          tags: foundry-stream-lab:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test health and Compare Run
        shell: bash
        run: |
          docker run -d --name foundry-stream-lab-ci \
            -p 127.0.0.1:18080:8080 \
            -e AI_PROVIDER=simulated \
            -e EVENT_TRANSPORT=memory \
            foundry-stream-lab:ci
          trap 'docker rm -f foundry-stream-lab-ci >/dev/null 2>&1 || true' EXIT
          for _ in {1..30}; do
            curl -fsS http://127.0.0.1:18080/api/v1/health | jq -e '.ready == true' >/dev/null && break
            sleep 1
          done
          receipt=$(curl -fsS \
            -H 'Content-Type: application/json' \
            --data '{"workload":"chat","scenario":"healthy","traffic":1}' \
            http://127.0.0.1:18080/api/v1/comparisons)
          comparison_id=$(jq -r '.comparisonId' <<<"$receipt")
          result='{}'
          for _ in {1..30}; do
            result=$(curl -fsS "http://127.0.0.1:18080/api/v1/comparisons/$comparison_id")
            [[ $(jq -r '.status' <<<"$result") == completed ]] && break
            sleep 1
          done
          jq -e '
            .status == "completed"
            and .providerInvocations == 3
            and (.phases | map(.profile)) == ["fixed", "router-default", "router-advanced"]
            and all(.phases[]; .completed == 1 and .failed == 0)
          ' <<<"$result"
