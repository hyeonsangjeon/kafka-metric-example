name: foundry-stream-lab

services:
  broker:
    image: apache/kafka:4.3.1
    hostname: broker
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://broker:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  topic-init:
    image: apache/kafka:4.3.1
    depends_on:
      broker:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -ec
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:19092 \
          --create --if-not-exists --topic foundry.telemetry.v1 \
          --partitions 4 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:19092 \
          --create --if-not-exists --topic foundry.telemetry.dlq.v1 \
          --partitions 1 --replication-factor 1

  app:
    build:
      context: .
    depends_on:
      topic-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_MODE: ${AI_MODE:-}
      EVENT_TRANSPORT: kafka
      KAFKA_BOOTSTRAP_SERVERS: broker:19092
      KAFKA_TOPIC: foundry.telemetry.v1
      KAFKA_DLQ_TOPIC: foundry.telemetry.dlq.v1
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      OLLAMA_REQUIRE_LOOPBACK: ${OLLAMA_REQUIRE_LOOPBACK:-true}
      FOUNDRY_PROJECT_ENDPOINT: ${FOUNDRY_PROJECT_ENDPOINT:-}
      FOUNDRY_MODEL: ${FOUNDRY_MODEL:-}
      FOUNDRY_ROUTER_DEFAULT_MODEL: ${FOUNDRY_ROUTER_DEFAULT_MODEL:-}
      FOUNDRY_ROUTER_ADVANCED_MODEL: ${FOUNDRY_ROUTER_ADVANCED_MODEL:-}
      FOUNDRY_ROUTER_ADVANCED_PROFILE: ${FOUNDRY_ROUTER_ADVANCED_PROFILE:-cost}
      FOUNDRY_ROUTER_MODEL: ${FOUNDRY_ROUTER_MODEL:-}
      FOUNDRY_ROUTER_PROFILE: ${FOUNDRY_ROUTER_PROFILE:-balanced}
      MAX_CLOUD_REQUESTS_PER_RUN: ${MAX_CLOUD_REQUESTS_PER_RUN:-10}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          body=$$(wget -qO- http://localhost:8080/api/v1/health) &&
          printf '%s' "$$body" | grep -q '"status":"ok"' &&
          printf '%s' "$$body" | grep -q '"ready":true' &&
          printf '%s' "$$body" | grep -q '"transport":"kafka"'
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
